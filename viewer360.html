<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 Viewer</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
}
canvas{
display:block;
}
</style>

</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>

<script>

function getParam(name){
const params=new URLSearchParams(window.location.search);
return params.get(name);
}

const pano = getParam("url") || "panorama.jpg";

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
1,
1000
);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry = new THREE.SphereGeometry(500,60,40);
geometry.scale(-1,1,1);

let texture = new THREE.TextureLoader().load(pano);

let material = new THREE.MeshBasicMaterial({
map:texture
});

let mesh = new THREE.Mesh(geometry,material);
scene.add(mesh);

camera.position.set(0,0,0.1);

let isUserInteracting=false;
let lon=0,lat=0;
let onPointerDownLon=0;
let onPointerDownLat=0;
let onPointerDownX=0;
let onPointerDownY=0;

function onPointerDown(event){
isUserInteracting=true;
onPointerDownX=event.clientX;
onPointerDownY=event.clientY;
onPointerDownLon=lon;
onPointerDownLat=lat;
}

function onPointerMove(event){
if(isUserInteracting){
lon=(onPointerDownX-event.clientX)*0.1+onPointerDownLon;
lat=(event.clientY-onPointerDownY)*0.1+onPointerDownLat;
}
}

function onPointerUp(){
isUserInteracting=false;
}

document.addEventListener("mousedown",onPointerDown);
document.addEventListener("mousemove",onPointerMove);
document.addEventListener("mouseup",onPointerUp);

document.addEventListener("wheel",function(e){
camera.fov += e.deltaY * 0.05;
camera.fov = Math.max(40,Math.min(100,camera.fov));
camera.updateProjectionMatrix();
});

function animate(){
requestAnimationFrame(animate);

lat=Math.max(-85,Math.min(85,lat));
let phi=THREE.MathUtils.degToRad(90-lat);
let theta=THREE.MathUtils.degToRad(lon);

camera.target=new THREE.Vector3(
500*Math.sin(phi)*Math.cos(theta),
500*Math.cos(phi),
500*Math.sin(phi)*Math.sin(theta)
);

camera.lookAt(camera.target);

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",function(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
